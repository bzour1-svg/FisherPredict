name: Build FisherPredict APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://services.gradle.org/distributions/gradle-8.2-bin.zip" -o /tmp/gradle.zip
          unzip -j /tmp/gradle.zip "*/lib/gradle-wrapper.jar" -d gradle/wrapper/ 2>/dev/null || \
          curl -L "https://github.com/gradle/gradle/raw/refs/tags/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
               -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FisherPredict-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
