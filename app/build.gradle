plugins {
    id 'com.android.application'
}

android {
    namespace 'com.fisher.overlay'
    compileSdk 34

    defaultConfig {
        applicationId "com.fisher.overlay"
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName "2.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }
}

dependencies {
}
